<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Submitted | Film Transportation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        .success-container { padding: 3rem; max-width: 600px; }
        .success-icon { font-size: 5rem; margin-bottom: 1.5rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 3px; background: linear-gradient(135deg, #fff, #e94560); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1.2rem; margin-bottom: 2rem; opacity: 0.9; }
        .buttons { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn { display: inline-block; padding: 15px 35px; text-decoration: none; border-radius: 50px; font-weight: 700; text-transform: uppercase; transition: all 0.3s; font-size: 0.95rem; }
        .btn-primary { background: linear-gradient(135deg, #e94560, #ff6b6b); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.1); border: 1px solid rgba(233, 69, 96, 0.4); color: white; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(233, 69, 96, 0.4); }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">&#9989;</div>
        <h1>Check Submitted</h1>
        <p>Vehicle record and photos have been saved successfully.</p>
        <div class="buttons">
            <a href="/vehicles/check.html" class="btn btn-primary">Submit Another</a>
            <a href="/vehicles/" class="btn btn-secondary">View Dashboard</a>
        </div>
    </div>
</body>
</html>
