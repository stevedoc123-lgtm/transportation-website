<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Calendar | Film Transpo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(233,69,96,0.3); }
        .header h1 { font-size: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; background: linear-gradient(135deg, #e94560, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-right { display: flex; gap: 12px; align-items: center; }
        .header select { padding: 6px 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(233,69,96,0.3); border-radius: 6px; color: #fff; font-size: 0.85rem; }
        .header select option { background: #1a1a2e; }
        .header a, .header button { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.8rem; background: none; border: 1px solid rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 4px; cursor: pointer; }
        .header a:hover, .header button:hover { border-color: #e94560; color: #e94560; }

        /* Month nav */
        .month-nav { display: flex; justify-content: center; align-items: center; gap: 24px; padding: 16px; }
        .month-nav h2 { font-size: 1.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 4px; min-width: 280px; text-align: center; background: linear-gradient(135deg, #fff, #e94560); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .month-btn { background: rgba(233,69,96,0.15); border: 1px solid rgba(233,69,96,0.3); color: #e94560; width: 44px; height: 44px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .month-btn:hover { background: #e94560; color: white; }

        /* Legend */
        .legend { display: flex; gap: 16px; padding: 8px 24px; flex-wrap: wrap; align-items: center; justify-content: center; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: rgba(255,255,255,0.6); }
        .legend-swatch { width: 16px; height: 16px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.2); }
        .legend-today { border: 2px solid #e94560; }

        /* Weekday headers */
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; padding: 0 16px; margin-top: 8px; }
        .weekday { padding: 8px; text-align: center; font-size: 0.8rem; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; }

        /* Calendar grid */
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; padding: 0 16px 16px; flex: 1; }

        /* Day cell — BIG */
        .day-cell { min-height: 120px; padding: 8px; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; position: relative; transition: all 0.2s; overflow: hidden; background: rgba(255,255,255,0.02); }
        .day-cell:hover { border-color: rgba(233,69,96,0.4); }
        .day-cell.empty { min-height: 60px; background: transparent; border-color: transparent; }
        .day-cell.today { border: 2px solid #e94560; box-shadow: 0 0 15px rgba(233,69,96,0.3); }
        .day-cell.weekend { background: rgba(255,255,255,0.01); }

        .day-num { font-weight: 700; font-size: 1rem; color: rgba(255,255,255,0.8); margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
        .day-num .shoot-day { background: #e94560; color: white; padding: 1px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; }

        .location-block { padding: 4px 8px; border-radius: 5px; margin-bottom: 3px; }
        .location-name { font-weight: 700; font-size: 0.8rem; color: rgba(0,0,0,0.85); text-transform: uppercase; }
        .location-address { font-size: 0.7rem; color: rgba(0,0,0,0.6); margin-top: 1px; }
        .location-type { font-size: 0.6rem; color: rgba(0,0,0,0.5); text-transform: uppercase; letter-spacing: 1px; }

        .move-badge { display: inline-block; background: #e94560; color: white; font-size: 0.65rem; font-weight: 800; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 1px; margin: 3px 0; }

        .off-label { color: rgba(255,255,255,0.3); font-size: 0.85rem; font-style: italic; text-align: center; margin-top: 20px; }

        .day-details { position: absolute; bottom: 4px; left: 8px; right: 8px; display: flex; justify-content: space-between; font-size: 0.65rem; color: rgba(255,255,255,0.3); }
        .day-details span { background: rgba(255,255,255,0.05); padding: 1px 6px; border-radius: 3px; }

        .day-notes { font-size: 0.65rem; color: rgba(255,255,255,0.4); margin-top: 4px; font-style: italic; }

        /* Empty state */
        .empty-state { text-align: center; padding: 6rem 2rem; color: rgba(255,255,255,0.4); }
        .empty-state h2 { margin-bottom: 1rem; }
        .empty-state a { color: #e94560; }

        @media (max-width: 1024px) {
            .day-cell { min-height: 100px; padding: 6px; }
            .location-name { font-size: 0.7rem; }
            .location-address { font-size: 0.6rem; }
        }
        @media (max-width: 768px) {
            .day-cell { min-height: 80px; }
            .month-nav h2 { font-size: 1.3rem; min-width: 200px; }
        }
        @media print {
            body { background: white; color: black; }
            .header { display: none; }
            .day-cell { border: 1px solid #ccc; }
            .day-num { color: black; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Production Calendar</h1>
        <div class="header-right">
            <select id="production-select">
                <option value="">Select Production...</option>
            </select>
            <button onclick="toggleFullscreen()">Fullscreen</button>
            <a href="/calendar/admin.html">Edit</a>
            <a href="/">Home</a>
        </div>
    </div>

    <div class="month-nav">
        <button class="month-btn" id="prev-btn" onclick="changeMonth(-1)">&#9664;</button>
        <h2 id="month-title">—</h2>
        <button class="month-btn" id="next-btn" onclick="changeMonth(1)">&#9654;</button>
    </div>

    <div class="legend" id="legend"></div>

    <div class="weekdays">
        <div class="weekday">Sun</div>
        <div class="weekday">Mon</div>
        <div class="weekday">Tue</div>
        <div class="weekday">Wed</div>
        <div class="weekday">Thu</div>
        <div class="weekday">Fri</div>
        <div class="weekday">Sat</div>
    </div>

    <div class="days-grid" id="days-grid">
        <div class="empty-state" style="grid-column:1/-1;">
            <h2>Select a production to view the calendar</h2>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://dshhqozxeaetzenekzqr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzaGhxb3p4ZWFldHplbmVrenFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzgwNTUsImV4cCI6MjA4OTk1NDA1NX0.qfyIW5ZAQeVbCSsZjfZ_6xdxklZW7Is-h_yuIYkB2ss';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

        let scheduleData = {};
        let locationColors = {};
        let currentYear, currentMonth;
        let allMonthsWithData = [];

        document.addEventListener('DOMContentLoaded', async () => {
            // Default to current month
            const now = new Date();
            currentYear = now.getFullYear();
            currentMonth = now.getMonth();

            await loadProductions();

            const params = new URLSearchParams(window.location.search);
            const prodId = params.get('prod');
            if (prodId) {
                document.getElementById('production-select').value = prodId;
                await loadSchedule(prodId);
            }

            document.getElementById('production-select').addEventListener('change', (e) => {
                if (e.target.value) loadSchedule(e.target.value);
            });

            // Auto-refresh every 5 minutes
            setInterval(() => {
                const sel = document.getElementById('production-select').value;
                if (sel) loadSchedule(sel);
            }, 300000);
        });

        async function loadProductions() {
            const { data } = await db.from('productions').select('*').eq('status', 'active').order('name');
            const select = document.getElementById('production-select');
            if (data) data.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = p.name;
                select.appendChild(opt);
            });
        }

        async function loadSchedule(productionId) {
            const { data } = await db
                .from('schedule_days')
                .select('*')
                .eq('production_id', productionId)
                .order('shoot_date');

            scheduleData = {};
            locationColors = {};
            allMonthsWithData = [];

            if (!data || data.length === 0) {
                document.getElementById('days-grid').innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><h2>No schedule data yet</h2><p><a href="/calendar/admin.html">Add days in the editor</a></p></div>';
                document.getElementById('legend').innerHTML = '';
                updateMonthTitle();
                return;
            }

            // Build lookup
            const monthSet = new Set();
            data.forEach(d => {
                scheduleData[d.shoot_date] = d;
                if (d.location_1_name && d.location_1_color) locationColors[d.location_1_name] = d.location_1_color;
                if (d.location_2_name && d.location_2_color) locationColors[d.location_2_name] = d.location_2_color;
                const dt = new Date(d.shoot_date + 'T12:00:00');
                monthSet.add(dt.getFullYear() + '-' + dt.getMonth());
            });
            allMonthsWithData = Array.from(monthSet);

            // Jump to first month with data
            const firstDate = new Date(data[0].shoot_date + 'T12:00:00');
            currentYear = firstDate.getFullYear();
            currentMonth = firstDate.getMonth();

            renderLegend();
            renderMonth();
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderMonth();
        }

        function updateMonthTitle() {
            document.getElementById('month-title').textContent = `${MONTH_NAMES[currentMonth]} ${currentYear}`;
        }

        function renderLegend() {
            const legend = document.getElementById('legend');
            const items = Object.entries(locationColors).map(([name, color]) =>
                `<div class="legend-item"><div class="legend-swatch" style="background:${color};"></div>${name}</div>`
            );
            items.push('<div class="legend-item"><div class="legend-swatch" style="border:2px solid #e94560;"></div>Today</div>');
            items.push('<div class="legend-item"><div class="legend-swatch" style="background:linear-gradient(180deg,#60a5fa 50%,#fbbf24 50%);"></div>Move Day</div>');
            legend.innerHTML = items.join('');
        }

        function renderMonth() {
            updateMonthTitle();
            const grid = document.getElementById('days-grid');
            const today = new Date();
            const todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const firstDow = new Date(currentYear, currentMonth, 1).getDay();

            let html = '';

            // Empty cells
            for (let i = 0; i < firstDow; i++) {
                html += '<div class="day-cell empty"></div>';
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = currentYear + '-' + String(currentMonth+1).padStart(2,'0') + '-' + String(day).padStart(2,'0');
                const dow = new Date(currentYear, currentMonth, day).getDay();
                const isToday = dateStr === todayStr;
                const isWeekend = dow === 0 || dow === 6;
                const sched = scheduleData[dateStr];

                let classes = 'day-cell';
                if (isToday) classes += ' today';
                if (isWeekend && !sched) classes += ' weekend';

                html += `<div class="${classes}">`;

                // Day number + shoot day badge
                html += `<div class="day-num">${day}`;
                if (sched?.shoot_day) html += `<span class="shoot-day">Day ${sched.shoot_day}</span>`;
                html += `</div>`;

                if (sched) {
                    if (sched.is_off_day) {
                        html += `<div class="off-label">${sched.off_day_label || 'OFF'}</div>`;
                    } else {
                        // Location 1
                        if (sched.location_1_name) {
                            html += `<div class="location-block" style="background:${sched.location_1_color}90;">`;
                            html += `<div class="location-name">${sched.location_1_name}</div>`;
                            if (sched.location_1_address) html += `<div class="location-address">${sched.location_1_address}</div>`;
                            if (sched.location_1_type) html += `<div class="location-type">${sched.location_1_type}</div>`;
                            html += `</div>`;
                        }

                        // Move
                        if (sched.has_move) {
                            html += `<div class="move-badge">&#8593; COMPANY MOVE &#8593;</div>`;
                        }

                        // Location 2
                        if (sched.location_2_name) {
                            html += `<div class="location-block" style="background:${sched.location_2_color}90;">`;
                            html += `<div class="location-name">${sched.location_2_name}</div>`;
                            if (sched.location_2_address) html += `<div class="location-address">${sched.location_2_address}</div>`;
                            if (sched.location_2_type) html += `<div class="location-type">${sched.location_2_type}</div>`;
                            html += `</div>`;
                        }

                        // Notes
                        if (sched.notes) {
                            html += `<div class="day-notes">${sched.notes}</div>`;
                        }

                        // Bottom details
                        const details = [];
                        if (sched.two_room) details.push(`2RM: ${sched.two_room}`);
                        if (sched.three_room) details.push(`3RM: ${sched.three_room}`);
                        if (sched.bg_count) details.push(`BG: ${sched.bg_count}`);
                        if (details.length) {
                            html += `<div class="day-details">${details.map(d => `<span>${d}</span>`).join('')}</div>`;
                        }
                    }
                }

                html += `</div>`;
            }

            grid.innerHTML = html;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
