[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/success"
  to = "/success.html"
  status = 200
  force = true

[[redirects]]
  from = "/success.html"
  to = "/success.html"
  status = 200

[[redirects]]
  from = "/vehicles/"
  to = "/vehicles/index.html"
  status = 200

[[redirects]]
  from = "/vehicles/check"
  to = "/vehicles/check.html"
  status = 200

[[redirects]]
  from = "/vehicles/success"
  to = "/vehicles/success.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
