<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Optimizer — Shadowmoor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        header {
            padding: 2rem 0 1.5rem;
            text-align: center;
            border-bottom: 2px solid rgba(233, 69, 96, 0.3);
            margin-bottom: 2rem;
        }
        header h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.3rem;
        }
        header p { color: rgba(255,255,255,0.45); font-size: 0.85rem; }

        /* ── Hero charge target ── */
        .hero {
            background: rgba(233, 69, 96, 0.08);
            border: 2px solid rgba(233, 69, 96, 0.4);
            border-radius: 20px;
            padding: 2.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .hero-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 0.5rem;
        }
        .hero-date {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 1rem;
        }
        .hero-value {
            font-size: 5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        .hero-unit {
            font-size: 1.4rem;
            color: rgba(255,255,255,0.6);
            margin-top: 0.3rem;
        }
        .hero-sub {
            margin-top: 1rem;
            font-size: 1rem;
            color: rgba(255,255,255,0.55);
        }
        .no-charge-badge {
            display: inline-block;
            background: rgba(52, 211, 153, 0.15);
            border: 1px solid rgba(52, 211, 153, 0.5);
            color: #34d399;
            padding: 0.4rem 1.2rem;
            border-radius: 100px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        /* ── Stats grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 1.2rem 1.4rem;
        }
        .card-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 0.4rem;
        }
        .card-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: #fff;
        }
        .card-unit { font-size: 0.9rem; color: rgba(255,255,255,0.4); margin-left: 3px; }
        .card-sub { font-size: 0.8rem; color: rgba(255,255,255,0.35); margin-top: 0.2rem; }

        /* ── Weather row ── */
        .weather-row {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 1rem 1.4rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.55);
        }
        .weather-row span b { color: rgba(255,255,255,0.85); }

        /* ── Panel health alert ── */
        .panel-alert {
            border-radius: 14px;
            padding: 1.2rem 1.4rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
        }
        .panel-alert.critical {
            background: rgba(248, 113, 113, 0.12);
            border: 1px solid rgba(248, 113, 113, 0.4);
        }
        .panel-alert.warn {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.35);
        }
        .panel-alert.watch {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .panel-alert.ok {
            background: rgba(52, 211, 153, 0.06);
            border: 1px solid rgba(52, 211, 153, 0.2);
        }
        .panel-alert-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
            line-height: 1.3;
        }
        .panel-alert-body {
            flex: 1;
        }
        .panel-alert-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 0.3rem;
        }
        .panel-alert-msg {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.8);
            line-height: 1.4;
        }
        .panel-alert-details {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
        }
        .panel-alert-details span b {
            color: rgba(255,255,255,0.65);
        }
        .panel-clean-btn {
            margin-top: 0.7rem;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
            border-radius: 8px;
            padding: 0.45rem 1rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .panel-clean-btn:hover {
            background: rgba(52, 211, 153, 0.15);
            border-color: rgba(52, 211, 153, 0.4);
            color: #34d399;
        }
        .panel-clean-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .clean-confirm {
            display: none;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
        }
        .clean-confirm button {
            background: rgba(52, 211, 153, 0.2);
            border: 1px solid rgba(52, 211, 153, 0.5);
            color: #34d399;
            border-radius: 6px;
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
            cursor: pointer;
            margin-right: 0.5rem;
        }
        .clean-confirm .cancel-btn {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.5);
        }

        /* ── Savings bar ── */
        .savings {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 1.2rem 1.4rem;
            margin-bottom: 1.5rem;
        }
        .savings-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 0.8rem;
        }
        .savings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        .savings-row .label { color: rgba(255,255,255,0.55); }
        .savings-row .amount { font-weight: 600; }
        .savings-row .amount.green { color: #34d399; }

        /* ── EV toggle ── */
        .ev-row {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 1rem 1.4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
        }
        .ev-toggle {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            user-select: none;
        }
        .toggle-switch {
            position: relative;
            width: 52px;
            height: 28px;
            background: rgba(255,255,255,0.1);
            border-radius: 100px;
            transition: background 0.25s;
            flex-shrink: 0;
        }
        .toggle-switch.on { background: #34d399; }
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px; left: 3px;
            width: 22px; height: 22px;
            border-radius: 50%;
            background: #fff;
            transition: transform 0.25s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }
        .toggle-switch.on::after { transform: translateX(24px); }
        .ev-label { font-size: 0.9rem; color: rgba(255,255,255,0.7); }
        .ev-kwh   { font-size: 0.8rem; color: rgba(255,255,255,0.35); }

        /* ── Apply button ── */
        .apply-section {
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .apply-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: linear-gradient(135deg, #e94560, #c73652);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            width: 100%;
            justify-content: center;
        }
        .apply-btn:hover  { opacity: 0.9; }
        .apply-btn:active { transform: scale(0.98); }
        .apply-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .apply-status {
            margin-top: 0.75rem;
            font-size: 0.9rem;
            min-height: 1.2rem;
            color: rgba(255,255,255,0.5);
        }
        .apply-status.success { color: #34d399; }
        .apply-status.error   { color: #f87171; }

        /* ── Footer ── */
        footer {
            text-align: center;
            color: rgba(255,255,255,0.2);
            font-size: 0.75rem;
            padding: 1.5rem 0;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        /* ── Live status bar ── */
        .live-bar {
            background: rgba(52, 211, 153, 0.08);
            border: 1px solid rgba(52, 211, 153, 0.25);
            border-radius: 14px;
            padding: 1rem 1.4rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .live-dot {
            width: 10px; height: 10px;
            background: #34d399;
            border-radius: 50%;
            animation: pulse 2s infinite;
            flex-shrink: 0;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .live-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
        }
        .live-stats {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            flex: 1;
        }
        .live-stat {
            text-align: center;
        }
        .live-val {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
        }
        .live-val.green { color: #34d399; }
        .live-val.yellow { color: #fbbf24; }
        .live-lbl {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.35);
        }
        .live-time {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            margin-left: auto;
        }

        /* ── Today's production chart ── */
        .today-chart-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 1.4rem;
            margin-bottom: 1.5rem;
        }
        .today-chart-card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 1rem;
        }
        .today-chart-wrap {
            position: relative;
            height: 200px;
        }

        /* ── Charts section ── */
        .charts-section {
            margin-bottom: 1.5rem;
        }
        .chart-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 1.4rem;
            margin-bottom: 1rem;
        }
        .chart-card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 1rem;
        }
        .chart-wrap {
            position: relative;
            height: 220px;
        }
        .accuracy-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .acc-stat {
            text-align: center;
            padding: 0.8rem;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
        }
        .acc-stat .val {
            font-size: 1.6rem;
            font-weight: 700;
        }
        .acc-stat .val.good { color: #34d399; }
        .acc-stat .val.warn { color: #fbbf24; }
        .acc-stat .val.bad  { color: #f87171; }
        .acc-stat .lbl {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            margin-top: 0.2rem;
        }
        .no-accuracy {
            text-align: center;
            padding: 2rem;
            color: rgba(255,255,255,0.3);
            font-size: 0.9rem;
        }

        /* ── Loading / error states ── */
        .state-box {
            text-align: center;
            padding: 4rem 2rem;
            color: rgba(255,255,255,0.4);
        }
        .state-box h2 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        .state-box p  { font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>⚡ Solar Optimizer</h1>
        <p>225 Shadowmoor Dr · Georgia Power Overnight Advantage</p>
    </header>

    <div id="app">
        <div class="state-box">
            <h2>Loading…</h2>
            <p>Fetching tonight's recommendation</p>
        </div>
    </div>

    <footer id="footer"></footer>
</div>

<script>
async function load() {
    const app    = document.getElementById('app');
    const footer = document.getElementById('footer');

    // Try data.json first, then overlay with fresher Supabase data
    let data;
    try {
        const resp = await fetch('data.json?t=' + Date.now());
        data = await resp.json();
    } catch (e) {
        data = null;
    }

    // Check Supabase for a newer prediction
    try {
        const predResp = await fetch(
            `${SUPABASE_URL}/rest/v1/solar_predictions?order=target_date.desc&limit=1&scored=eq.false`,
            { headers: { apikey: SUPABASE_KEY } }
        );
        const preds = await predResp.json();
        if (preds.length > 0) {
            const sp = preds[0];
            const spDate = sp.target_date;
            const djDate = data?.target_date;

            // Use Supabase prediction if it's newer than data.json
            if (!djDate || spDate > djDate) {
                // Get latest live reading for current SOC
                const liveResp = await fetch(
                    `${SUPABASE_URL}/rest/v1/solar_readings?order=timestamp.desc&limit=1`,
                    { headers: { apikey: SUPABASE_KEY } }
                );
                const live = (await liveResp.json())[0] || {};
                const currentSoc = live.soc || 50;
                const currentKwh = currentSoc / 100 * 80;

                // Build data object from Supabase
                const predSolar = sp.predicted_solar_kwh || 0;
                const predLoad = sp.predicted_load_kwh || 0;
                const chargeTarget = sp.charge_target_pct || 90;
                const targetKwh = chargeTarget / 100 * 80;
                const chargeNeeded = Math.max(0, targetKwh - currentKwh);
                const solarGap = Math.max(0, predLoad - predSolar);
                const RATE = 0.070;

                data = {
                    target_date: spDate,
                    generated_at: new Date(sp.created_at).toLocaleString(),
                    status: 'ok',
                    solar_r2: data?.solar_r2 || 0.22,
                    load_r2: data?.load_r2 || 0.18,
                    prediction: {
                        target_soc_pct: chargeTarget,
                        current_soc_pct: currentSoc,
                        current_kwh: Math.round(currentKwh * 10) / 10,
                        target_kwh: Math.round(targetKwh * 10) / 10,
                        predicted_solar_kwh: predSolar,
                        predicted_load_kwh: predLoad,
                        solar_gap_kwh: Math.round(solarGap * 10) / 10,
                        charge_needed_kwh: Math.round(chargeNeeded * 10) / 10,
                        overnight_loads_kwh: 34,
                        ev_charging: true,
                    },
                    forecast: {
                        cloud_cover_pct: sp.forecast_cloud_cover || 0,
                        shortwave_radiation: sp.forecast_radiation || 0,
                        sunshine_hours: 0,
                        temp_min_f: 0,
                        temp_max_f: 0,
                    },
                    savings: {
                        current_nightly_kwh: 64,
                        current_nightly_cost: 4.48,
                        optimal_nightly_kwh: Math.round(chargeNeeded * 10) / 10,
                        optimal_nightly_cost: Math.round(chargeNeeded * RATE * 100) / 100,
                        daily_savings: Math.round((64 * RATE - chargeNeeded * RATE) * 100) / 100,
                        monthly_savings: Math.round((64 * RATE - chargeNeeded * RATE) * 30 * 100) / 100,
                        annual_savings: Math.round((64 * RATE - chargeNeeded * RATE) * 365 * 100) / 100,
                    },
                    source: 'supabase',
                };
            }
        }
    } catch (e) {
        console.warn('Supabase prediction fetch failed:', e);
    }

    if (!data) {
        app.innerHTML = `<div class="state-box"><h2>Could not load data</h2><p>No data available</p></div>`;
        return;
    }

    if (data.status === 'pending') {
        app.innerHTML = `<div class="state-box"><h2>⏳ ${data.message}</h2><p>Check back after 7 PM</p></div>`;
        return;
    }

    const p  = data.prediction;
    const s  = data.savings;
    const fc = data.forecast;
    const noCharge = p.charge_needed_kwh === 0;

    const cloudIcon = fc.cloud_cover_pct < 30 ? '☀️' :
                      fc.cloud_cover_pct < 60 ? '⛅' : '☁️';

    app.innerHTML = `
        <!-- Hero -->
        <div class="hero">
            <div class="hero-label">Tonight's Battery Target</div>
            <div class="hero-date">Tomorrow · ${data.target_date}</div>
            <div class="hero-value" id="hero-soc">${p.target_soc_pct}<span style="font-size:2rem">%</span></div>
            <div id="hero-detail">
            ${noCharge
                ? `<div class="no-charge-badge">✅ No charging needed tonight</div>`
                : `<div class="hero-unit">Charge ${p.charge_needed_kwh} kWh between 11 PM – 7 AM</div>
                   <div class="hero-sub">@ $0.07/kWh all-in super off-peak rate</div>`
            }
            </div>
        </div>

        <!-- Live Status from Pi -->
        <div class="live-bar" id="live-bar" style="display:none">
            <div class="live-dot"></div>
            <div class="live-label">Live from Pi</div>
            <div class="live-stats" id="live-stats"></div>
            <div class="live-time" id="live-time"></div>
        </div>

        <!-- Today's Solar Production -->
        <div class="today-chart-card" id="today-chart-card" style="display:none">
            <h3>Today's System — Live from Raspberry Pi</h3>
            <div class="today-chart-wrap"><canvas id="today-chart"></canvas></div>
        </div>

        <!-- Stats -->
        <div class="grid">
            <div class="card">
                <div class="card-label">Battery Now</div>
                <div class="card-value">${p.current_soc_pct}<span class="card-unit">%</span></div>
                <div class="card-sub">${p.current_kwh} kWh stored</div>
            </div>
            <div class="card">
                <div class="card-label">Predicted Solar</div>
                <div class="card-value">${p.predicted_solar_kwh}<span class="card-unit">kWh</span></div>
                <div class="card-sub">${cloudIcon} ${fc.cloud_cover_pct}% cloud · ${fc.sunshine_hours.toFixed(1)} hrs sun</div>
            </div>
            <div class="card">
                <div class="card-label">Predicted Load</div>
                <div class="card-value">${p.predicted_load_kwh}<span class="card-unit">kWh</span></div>
                <div class="card-sub">House + EV + spa</div>
            </div>
            <div class="card">
                <div class="card-label">Solar Gap</div>
                <div class="card-value">${p.solar_gap_kwh}<span class="card-unit">kWh</span></div>
                <div class="card-sub">Grid or battery must cover this</div>
            </div>
        </div>

        <!-- Weather -->
        <div class="weather-row">
            <span>${cloudIcon} <b>${fc.cloud_cover_pct}%</b> cloud cover</span>
            <span>☀️ <b>${fc.sunshine_hours.toFixed(1)} hrs</b> sunshine</span>
            <span>🌡️ <b>${fc.temp_min_f}° – ${fc.temp_max_f}°F</b></span>
            <span>📡 <b>${fc.shortwave_radiation} MJ/m²</b> radiation</span>
        </div>

        <!-- Panel Health Alert -->
        <div id="panel-health-slot"></div>

        <!-- EV toggle -->
        <div class="ev-row">
            <span>🚗 Charging the EV tonight?</span>
            <label class="ev-toggle" id="ev-toggle">
                <div class="toggle-switch on" id="toggle-switch"></div>
                <span class="ev-label" id="ev-label">YES</span>
                <span class="ev-kwh" id="ev-kwh">— 30 kWh</span>
            </label>
        </div>

        <!-- Savings -->
        <div class="savings">
            <div class="savings-title">💰 Savings vs charging to 100% every night</div>
            <div class="savings-row">
                <span class="label">Old way (100% every night)</span>
                <span class="amount">${s.current_nightly_kwh} kWh · $${s.current_nightly_cost}/night</span>
            </div>
            <div class="savings-row">
                <span class="label">Optimized tonight</span>
                <span class="amount" id="opt-kwh">${s.optimal_nightly_kwh} kWh · $${s.optimal_nightly_cost}/night</span>
            </div>
            <div class="savings-row" style="border-top:1px solid rgba(255,255,255,0.06);padding-top:0.5rem;margin-top:0.3rem">

            </div>
            <div class="savings-row">
                <span class="label">Monthly run rate</span>
                <span class="amount green" id="saving-monthly">$${s.monthly_savings}</span>
            </div>
            <div class="savings-row">
                <span class="label">Annual run rate</span>
                <span class="amount green" id="saving-annual">$${s.annual_savings}</span>
            </div>
        <!-- Charge Target Control -->
        <div class="apply-section" style="padding:0 1.4rem 1rem">
            <div style="display:flex;align-items:center;gap:1rem;margin-bottom:0.8rem">
                <span style="font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.4)">Set Charge Target</span>
                <span style="font-size:1.8rem;font-weight:700;color:#fff" id="slider-val">${p.target_soc_pct}%</span>
            </div>
            <input type="range" id="charge-slider" min="20" max="100" step="5" value="${p.target_soc_pct}"
                style="width:100%;accent-color:#e94560;height:8px;cursor:pointer;margin-bottom:1rem"
                oninput="document.getElementById('slider-val').textContent=this.value+'%'">
            <button class="apply-btn" id="apply-btn" onclick="applyToInverter()">
                ⚡ Apply to Inverter
            </button>
            <div class="apply-status" id="apply-status">
                Connected to Pi via Cloudflare Tunnel
            </div>
        </div>

        </div>

        <!-- Accuracy Charts -->
        <div class="charts-section" id="charts-section"></div>
    `;

    const src = data.source === 'supabase' ? ' · Live from Pi' : '';
    footer.textContent = `Last updated: ${data.generated_at}${src} · Model accuracy — Solar R²: ${data.solar_r2} · Load R²: ${data.load_r2}`;

    // ── Panel health alert ─────────────────────────────────────
    renderPanelHealth(data.panel_health);

    // ── Load accuracy charts ────────────────────────────────────
    loadAccuracyCharts();

    // ── EV toggle logic ──────────────────────────────────────────
    const BATTERY_KWH   = 80;
    const MIN_SOC       = 0.20;
    const MAX_SOC       = 0.90;
    const RATE          = 0.070;
    const OLD_CHARGE    = 64;    // what you charge now (80% of 80kWh)
    const EV_KWH        = 30;
    const SPA_KWH       = 4;

    // Remember EV toggle across refreshes
    const savedEv = localStorage.getItem('ev_charging');
    let evOn = savedEv !== null ? savedEv === 'true' : p.ev_charging !== false;

    // Apply saved state immediately
    document.getElementById('toggle-switch').classList.toggle('on', evOn);
    document.getElementById('ev-label').textContent = evOn ? 'YES' : 'NO';
    document.getElementById('ev-kwh').textContent   = evOn ? '— 30 kWh' : '— saving 30 kWh';

    function recalc() {
        const overnightLoads = SPA_KWH + (evOn ? EV_KWH : 0);
        const currentKwh     = BATTERY_KWH * (p.current_soc_pct / 100);
        const minKwh         = BATTERY_KWH * MIN_SOC;
        const maxKwh         = BATTERY_KWH * MAX_SOC;
        const buffer         = p.predicted_load_kwh * 0.10;
        const targetKwh      = Math.min(maxKwh, minKwh + overnightLoads + p.solar_gap_kwh + buffer);
        const chargeNeeded   = Math.max(0, Math.round(targetKwh - currentKwh));
        const targetSoc      = Math.round(targetKwh / BATTERY_KWH * 100);
        const optCost        = (chargeNeeded * RATE).toFixed(2);
        const oldCost        = (OLD_CHARGE * RATE).toFixed(2);
        const dailySav       = (oldCost - optCost).toFixed(2);

        // Update hero
        document.getElementById('hero-soc').textContent  = targetSoc + '%';
        if (chargeNeeded === 0) {
            document.getElementById('hero-detail').innerHTML =
                `<div class="no-charge-badge">✅ No charging needed tonight</div>`;
        } else {
            document.getElementById('hero-detail').innerHTML =
                `<div class="hero-unit">Charge ${chargeNeeded} kWh between 11 PM – 7 AM</div>
                 <div class="hero-sub">@ $0.07/kWh all-in super off-peak rate</div>`;
        }

        // Update savings
        document.getElementById('opt-kwh').textContent    = `${chargeNeeded} kWh · $${optCost}/night`;
        document.getElementById('saving-daily').textContent   = `$${dailySav}`;
        document.getElementById('saving-monthly').textContent = `$${(dailySav * 30).toFixed(2)}`;
        document.getElementById('saving-annual').textContent  = `$${(dailySav * 365).toFixed(2)}`;
    }

    // Recalc on load with saved EV state
    recalc();

    document.getElementById('ev-toggle').addEventListener('click', () => {
        evOn = !evOn;
        localStorage.setItem('ev_charging', evOn);
        document.getElementById('toggle-switch').classList.toggle('on', evOn);
        document.getElementById('ev-label').textContent = evOn ? 'YES' : 'NO';
        document.getElementById('ev-kwh').textContent   = evOn ? '— 30 kWh' : '— saving 30 kWh';
        recalc();
    });
}

// ── Apply charge target to inverter via Pi ───────────────────────────────────
const PI_API = 'https://pi.getchargesmart.com';
const PI_KEY = 'chargesmart-2026';

async function applyToInverter() {
    const btn    = document.getElementById('apply-btn');
    const status = document.getElementById('apply-status');
    const slider = document.getElementById('charge-slider');
    const target = parseInt(slider.value);

    btn.disabled = true;
    btn.textContent = '⏳ Applying…';
    status.textContent = `Writing ${target}% to inverter via Pi...`;
    status.className = 'apply-status';

    try {
        const resp = await fetch(`${PI_API}/set-target`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Api-Key': PI_KEY,
            },
            body: JSON.stringify({ target }),
        });

        const result = await resp.json();
        if (result.success) {
            btn.textContent = `✅ Set to ${result.after}%`;
            status.textContent = `Was ${result.before}% → now ${result.after}%`;
            status.className = 'apply-status success';
            // Update hero display
            document.getElementById('hero-soc').textContent = result.after + '%';
            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = '⚡ Apply to Inverter';
            }, 3000);
        } else {
            throw new Error(result.error || `Read back ${result.after}%, expected ${target}%`);
        }
    } catch (e) {
        btn.disabled = false;
        btn.textContent = '⚡ Apply to Inverter';
        status.textContent = `❌ ${e.message}`;
        status.className = 'apply-status error';
    }
}

// ── Accuracy Charts ──────────────────────────────────────────────────────────
async function loadAccuracyCharts() {
    const section = document.getElementById('charts-section');
    if (!section) return;

    let acc;
    try {
        // Try Supabase first for latest accuracy data
        const sbResp = await fetch(
            `${SUPABASE_URL}/rest/v1/solar_predictions?scored=eq.true&order=target_date.asc`,
            { headers: { apikey: SUPABASE_KEY } }
        );
        const sbAcc = await sbResp.json();
        if (sbAcc.length > 0) {
            acc = sbAcc.map(r => ({
                date: r.target_date,
                pred_solar: r.predicted_solar_kwh,
                actual_solar: r.actual_solar_kwh,
                solar_error_pct: r.solar_error_pct,
                pred_load: r.predicted_load_kwh,
                actual_load: r.actual_load_kwh,
                load_error_pct: r.load_error_pct,
                charge_target: r.charge_target_pct,
                actual_import: 0,
                actual_export: 0,
            }));
        } else {
            // Fall back to static file
            const resp = await fetch('accuracy.json?t=' + Date.now());
            acc = await resp.json();
        }
    } catch (e) {
        try {
            const resp = await fetch('accuracy.json?t=' + Date.now());
            acc = await resp.json();
        } catch (e2) {
            section.innerHTML = `<div class="no-accuracy">Accuracy tracking starts after the first full day of predictions.</div>`;
            return;
        }
    }

    if (!acc || acc.length === 0) {
        section.innerHTML = `<div class="no-accuracy">No accuracy data yet. Check back tomorrow.</div>`;
        return;
    }

    // Sort by date
    acc.sort((a, b) => a.date.localeCompare(b.date));

    const dates       = acc.map(r => r.date.slice(5)); // MM-DD
    const predSolar   = acc.map(r => r.pred_solar);
    const actSolar    = acc.map(r => r.actual_solar);
    const predLoad    = acc.map(r => r.pred_load);
    const actLoad     = acc.map(r => r.actual_load);
    const solarErrors = acc.map(r => Math.abs(r.solar_error_pct));
    const loadErrors  = acc.map(r => Math.abs(r.load_error_pct));

    // Compute summary stats
    const avgSolarErr = (solarErrors.reduce((a,b) => a+b, 0) / solarErrors.length).toFixed(1);
    const avgLoadErr  = (loadErrors.reduce((a,b) => a+b, 0) / loadErrors.length).toFixed(1);
    const daysScored  = acc.length;
    const overcharges = acc.filter(r => (r.pred_load - r.pred_solar) > (r.actual_load - r.actual_solar)).length;

    function errClass(v) { return v < 15 ? 'good' : v < 30 ? 'warn' : 'bad'; }

    section.innerHTML = `
        <div class="chart-card">
            <h3>Prediction Accuracy — ${daysScored} days tracked</h3>
            <div class="accuracy-stats">
                <div class="acc-stat">
                    <div class="val ${errClass(avgSolarErr)}">${avgSolarErr}%</div>
                    <div class="lbl">Avg Solar Error</div>
                </div>
                <div class="acc-stat">
                    <div class="val ${errClass(avgLoadErr)}">${avgLoadErr}%</div>
                    <div class="lbl">Avg Load Error</div>
                </div>
                <div class="acc-stat">
                    <div class="val" style="color:rgba(255,255,255,0.8)">${daysScored}</div>
                    <div class="lbl">Days Scored</div>
                </div>
                <div class="acc-stat">
                    <div class="val" style="color:rgba(255,255,255,0.8)">${overcharges}/${daysScored}</div>
                    <div class="lbl">Days Overcharged</div>
                </div>
            </div>
        </div>
        <div class="chart-card">
            <h3>Solar — Predicted vs Actual (kWh)</h3>
            <div class="chart-wrap"><canvas id="solar-chart"></canvas></div>
        </div>
        <div class="chart-card">
            <h3>Load — Predicted vs Actual (kWh)</h3>
            <div class="chart-wrap"><canvas id="load-chart"></canvas></div>
        </div>
        <div class="chart-card">
            <h3>Prediction Error Over Time (%)</h3>
            <div class="chart-wrap"><canvas id="error-chart"></canvas></div>
        </div>
    `;

    const chartDefaults = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: {
                labels: { color: 'rgba(255,255,255,0.6)', font: { size: 11 } }
            }
        },
        scales: {
            x: {
                ticks: { color: 'rgba(255,255,255,0.4)', font: { size: 10 } },
                grid:  { color: 'rgba(255,255,255,0.05)' }
            },
            y: {
                ticks: { color: 'rgba(255,255,255,0.4)', font: { size: 10 } },
                grid:  { color: 'rgba(255,255,255,0.05)' }
            }
        }
    };

    // Solar chart
    new Chart(document.getElementById('solar-chart'), {
        type: 'bar',
        data: {
            labels: dates,
            datasets: [
                {
                    label: 'Predicted',
                    data: predSolar,
                    backgroundColor: 'rgba(233, 69, 96, 0.6)',
                    borderColor: 'rgba(233, 69, 96, 1)',
                    borderWidth: 1,
                    borderRadius: 4,
                    barPercentage: 0.8,
                    categoryPercentage: 0.7,
                },
                {
                    label: 'Actual',
                    data: actSolar,
                    backgroundColor: 'rgba(251, 191, 36, 0.6)',
                    borderColor: 'rgba(251, 191, 36, 1)',
                    borderWidth: 1,
                    borderRadius: 4,
                    barPercentage: 0.8,
                    categoryPercentage: 0.7,
                }
            ]
        },
        options: { ...chartDefaults }
    });

    // Load chart
    new Chart(document.getElementById('load-chart'), {
        type: 'bar',
        data: {
            labels: dates,
            datasets: [
                {
                    label: 'Predicted',
                    data: predLoad,
                    backgroundColor: 'rgba(99, 102, 241, 0.6)',
                    borderColor: 'rgba(99, 102, 241, 1)',
                    borderWidth: 1,
                    borderRadius: 4,
                    barPercentage: 0.8,
                    categoryPercentage: 0.7,
                },
                {
                    label: 'Actual',
                    data: actLoad,
                    backgroundColor: 'rgba(52, 211, 153, 0.6)',
                    borderColor: 'rgba(52, 211, 153, 1)',
                    borderWidth: 1,
                    borderRadius: 4,
                    barPercentage: 0.8,
                    categoryPercentage: 0.7,
                }
            ]
        },
        options: { ...chartDefaults }
    });

    // Error % chart (line)
    new Chart(document.getElementById('error-chart'), {
        type: 'line',
        data: {
            labels: dates,
            datasets: [
                {
                    label: 'Solar Error %',
                    data: solarErrors,
                    borderColor: '#e94560',
                    backgroundColor: 'rgba(233, 69, 96, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                    pointBackgroundColor: '#e94560',
                },
                {
                    label: 'Load Error %',
                    data: loadErrors,
                    borderColor: '#6366f1',
                    backgroundColor: 'rgba(99, 102, 241, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                    pointBackgroundColor: '#6366f1',
                }
            ]
        },
        options: { ...chartDefaults }
    });
}

// ── Panel Health Rendering ───────────────────────────────────────────────────
function renderPanelHealth(h) {
    const slot = document.getElementById('panel-health-slot');
    if (!slot || !h) return;

    const icons = { critical: '🚨', warn: '⚠️', watch: '👀', ok: '✅' };
    const icon = icons[h.severity] || '✅';

    let details = '';
    if (h.pollen_count) details += '<span>Pollen: <b>' + h.pollen_count.toLocaleString() + '</b></span>';
    if (h.last_rain_date) details += '<span>Last rain: <b>' + h.days_since_rain + ' days ago</b> (' + h.last_rain_mm + 'mm)</span>';
    if (h.last_manual_cleaning) details += '<span>Last cleaned: <b>' + h.days_since_manual_cleaning + ' days ago</b></span>';
    if (h.pollen_season) details += '<span>Season: <b>' + h.pollen_season_name + '</b></span>';

    const showBtn = h.severity !== 'ok';

    slot.innerHTML = '<div class="panel-alert ' + h.severity + '">'
        + '<div class="panel-alert-icon">' + icon + '</div>'
        + '<div class="panel-alert-body">'
        + '<div class="panel-alert-title">Panel Cleanliness</div>'
        + '<div class="panel-alert-msg">' + h.message + '</div>'
        + '<div class="panel-alert-details">' + details + '</div>'
        + (showBtn
            ? '<button class="panel-clean-btn" id="clean-btn" onclick="showCleanConfirm()">'
              + 'I just cleaned the panels</button>'
              + '<div class="clean-confirm" id="clean-confirm">'
              + 'Are you sure? <button onclick="logCleaning()">Yes, they\'re clean</button>'
              + ' <button class="cancel-btn" onclick="hideCleanConfirm()">Cancel</button></div>'
              + '<div id="clean-status" style="margin-top:0.4rem;font-size:0.8rem;min-height:1rem"></div>'
            : '')
        + '</div></div>';
}

// ── Panel Cleaning Log ──────────────────────────────────────────────────────
function showCleanConfirm() {
    document.getElementById('clean-confirm').style.display = 'block';
}
function hideCleanConfirm() {
    document.getElementById('clean-confirm').style.display = 'none';
}
async function logCleaning() {
    const btn = document.getElementById('clean-btn');
    const confirm = document.getElementById('clean-confirm');
    const status = document.getElementById('clean-status');

    btn.disabled = true;
    confirm.style.display = 'none';
    status.textContent = 'Logging...';
    status.style.color = 'rgba(255,255,255,0.5)';

    try {
        // Write to Supabase
        const resp = await fetch(`${SUPABASE_URL}/rest/v1/panel_cleanings`, {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_KEY,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation',
            },
            body: JSON.stringify({
                cleaned_at: new Date().toISOString(),
                note: 'Logged from dashboard',
            }),
        });

        if (resp.ok) {
            btn.textContent = 'Logged!';
            status.textContent = 'Panel cleaning recorded. Alert will clear on next update (7 PM).';
            status.style.color = '#34d399';
        } else {
            const err = await resp.json();
            // If table doesn't exist, store in localStorage as fallback
            if (err.code === 'PGRST205' || resp.status === 404) {
                localStorage.setItem('last_panel_cleaning', new Date().toISOString());
                btn.textContent = 'Logged locally!';
                status.textContent = 'Saved locally (Supabase table not set up yet). Run "python3 panel_health.py --cleaned" on the server to persist.';
                status.style.color = '#fbbf24';
            } else {
                throw new Error(err.message || 'Write failed');
            }
        }
    } catch (e) {
        // Fallback to localStorage
        localStorage.setItem('last_panel_cleaning', new Date().toISOString());
        btn.textContent = 'Logged locally!';
        status.textContent = 'Saved locally. Run "python3 panel_health.py --cleaned" to persist.';
        status.style.color = '#fbbf24';
    }
}
