<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Optimizer — Shadowmoor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        header {
            padding: 2rem 0 1.5rem;
            text-align: center;
            border-bottom: 2px solid rgba(233, 69, 96, 0.3);
            margin-bottom: 2rem;
        }
        header h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.3rem;
        }
        header p { color: rgba(255,255,255,0.45); font-size: 0.85rem; }

        /* ── Hero charge target ── */
        .hero {
            background: rgba(233, 69, 96, 0.08);
            border: 2px solid rgba(233, 69, 96, 0.4);
            border-radius: 20px;
            padding: 2.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .hero-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 0.5rem;
        }
        .hero-date {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 1rem;
        }
        .hero-value {
            font-size: 5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        .hero-unit {
            font-size: 1.4rem;
            color: rgba(255,255,255,0.6);
            margin-top: 0.3rem;
        }
        .hero-sub {
            margin-top: 1rem;
            font-size: 1rem;
            color: rgba(255,255,255,0.55);
        }
        .no-charge-badge {
            display: inline-block;
            background: rgba(52, 211, 153, 0.15);
            border: 1px solid rgba(52, 211, 153, 0.5);
            color: #34d399;
            padding: 0.4rem 1.2rem;
            border-radius: 100px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        /* ── Stats grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 1.2rem 1.4rem;
        }
        .card-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 0.4rem;
        }
        .card-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: #fff;
        }
        .card-unit { font-size: 0.9rem; color: rgba(255,255,255,0.4); margin-left: 3px; }
        .card-sub { font-size: 0.8rem; color: rgba(255,255,255,0.35); margin-top: 0.2rem; }

        /* ── Weather row ── */
        .weather-row {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 1rem 1.4rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.55);
        }
        .weather-row span b { color: rgba(255,255,255,0.85); }

        /* ── Savings bar ── */
        .savings {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 1.2rem 1.4rem;
            margin-bottom: 1.5rem;
        }
        .savings-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 0.8rem;
        }
        .savings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        .savings-row .label { color: rgba(255,255,255,0.55); }
        .savings-row .amount { font-weight: 600; }
        .savings-row .amount.green { color: #34d399; }

        /* ── EV toggle ── */
        .ev-row {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 1rem 1.4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
        }
        .ev-toggle {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            user-select: none;
        }
        .toggle-switch {
            position: relative;
            width: 52px;
            height: 28px;
            background: rgba(255,255,255,0.1);
            border-radius: 100px;
            transition: background 0.25s;
            flex-shrink: 0;
        }
        .toggle-switch.on { background: #34d399; }
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px; left: 3px;
            width: 22px; height: 22px;
            border-radius: 50%;
            background: #fff;
            transition: transform 0.25s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }
        .toggle-switch.on::after { transform: translateX(24px); }
        .ev-label { font-size: 0.9rem; color: rgba(255,255,255,0.7); }
        .ev-kwh   { font-size: 0.8rem; color: rgba(255,255,255,0.35); }

        /* ── Apply button ── */
        .apply-section {
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .apply-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: linear-gradient(135deg, #e94560, #c73652);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            width: 100%;
            justify-content: center;
        }
        .apply-btn:hover  { opacity: 0.9; }
        .apply-btn:active { transform: scale(0.98); }
        .apply-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .apply-status {
            margin-top: 0.75rem;
            font-size: 0.9rem;
            min-height: 1.2rem;
            color: rgba(255,255,255,0.5);
        }
        .apply-status.success { color: #34d399; }
        .apply-status.error   { color: #f87171; }

        /* ── Footer ── */
        footer {
            text-align: center;
            color: rgba(255,255,255,0.2);
            font-size: 0.75rem;
            padding: 1.5rem 0;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        /* ── Live status bar ── */
        .live-bar {
            background: rgba(52, 211, 153, 0.08);
            border: 1px solid rgba(52, 211, 153, 0.25);
            border-radius: 14px;
            padding: 1rem 1.4rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .live-dot {
            width: 10px; height: 10px;
            background: #34d399;
            border-radius: 50%;
            animation: pulse 2s infinite;
            flex-shrink: 0;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .live-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
        }
        .live-stats {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            flex: 1;
        }
        .live-stat {
            text-align: center;
        }
        .live-val {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
        }
        .live-val.green { color: #34d399; }
        .live-val.yellow { color: #fbbf24; }
        .live-lbl {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.35);
        }
        .live-time {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            margin-left: auto;
        }

        /* ── Today's production chart ── */
        .today-chart-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 1.4rem;
            margin-bottom: 1.5rem;
        }
        .today-chart-card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 1rem;
        }
        .today-chart-wrap {
            position: relative;
            height: 200px;
        }

        /* ── Charts section ── */
        .charts-section {
            margin-bottom: 1.5rem;
        }
        .chart-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 1.4rem;

        }
        .chart-card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;

        .chart-wrap {

        .accuracy-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));

        .acc-stat {
            text-align: center;
            padding: 0.8rem;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
        }
        .acc-stat .val {
            font-size: 1.6rem;
            font-weight: 700;
        }
        .acc-stat .val.good { color: #34d399; }
        .acc-stat .val.warn { color: #fbbf24; }
        .acc-stat .val.bad  { color: #f87171; }

            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            margin-top: 0.2rem;
        }
        .no-accuracy {
            text-align: center;
            padding: 2rem;
            color: rgba(255,255,255,0.3);
            font-size: 0.9rem;
        }

        /* ── Loading / error states ── */
        .state-box {
            text-align: center;
            padding: 4rem 2rem;
            color: rgba(255,255,255,0.4);
        }
        .state-box h2 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        .state-box p  { font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>⚡ Solar Optimizer</h1>
        <p>225 Shadowmoor Dr · Georgia Power Overnight Advantage</p>
    </header>

    <div id="app">
        <div class="state-box">
            <h2>Loading…</h2>
            <p>Fetching tonight's recommendation</p>
        </div>
    </div>

    <footer id="footer"></footer>
</div>

<script>
async function load() {
    const app    = document.getElementById('app');
    const footer = document.getElementById('footer');

    let data;
    try {
        const resp = await fetch('data.json?t=' + Date.now());
        data = await resp.json();
    } catch (e) {
        app.innerHTML = `<div class="state-box"><h2>Could not load data</h2><p>${e.message}</p></div>`;
        return;
    }

    // Inject agent config from data.json
    window._agentUrl = data.agent_url || '';
    window._agentKey = data.agent_key || '';

    if (data.status === 'pending') {
        app.innerHTML = `<div class="state-box"><h2>⏳ ${data.message}</h2><p>Check back after 7 PM</p></div>`;
        return;
    }

    const p  = data.prediction;
    const s  = data.savings;
    const fc = data.forecast;
    const noCharge = p.charge_needed_kwh === 0;

    const cloudIcon = fc.cloud_cover_pct < 30 ? '☀️' :
                      fc.cloud_cover_pct < 60 ? '⛅' : '☁️';

    app.innerHTML = `
        <!-- Hero -->
        <div class="hero">
            <div class="hero-label">Tonight's Battery Target</div>
            <div class="hero-date">Tomorrow · ${data.target_date}</div>
            <div class="hero-value" id="hero-soc">${p.target_soc_pct}<span style="font-size:2rem">%</span></div>
            <div id="hero-detail">
            ${noCharge
                ? `<div class="no-charge-badge">✅ No charging needed tonight</div>`
                : `<div class="hero-unit">Charge ${p.charge_needed_kwh} kWh between 11 PM – 7 AM</div>
                   <div class="hero-sub">@ $0.07/kWh all-in super off-peak rate</div>`
            }
            </div>
        </div>

        <!-- Live Status from Pi -->
        <div class="live-bar" id="live-bar" style="display:none">
            <div class="live-dot"></div>
            <div class="live-label">Live from Pi</div>
            <div class="live-stats" id="live-stats"></div>
            <div class="live-time" id="live-time"></div>
        </div>

        <!-- Today's Solar Production -->
        <div class="today-chart-card" id="today-chart-card" style="display:none">
            <h3>Today's System — Live from Raspberry Pi</h3>
            <div class="today-chart-wrap"><canvas id="today-chart"></canvas></div>
        </div>

        <!-- Stats -->
        <div class="grid">
            <div class="card">
                <div class="card-label">Battery Now</div>
                <div class="card-value">${p.current_soc_pct}<span class="card-unit">%</span></div>
                <div class="card-sub">${p.current_kwh} kWh stored</div>
            </div>
            <div class="card">
                <div class="card-label">Predicted Solar</div>
                <div class="card-value">${p.predicted_solar_kwh}<span class="card-unit">kWh</span></div>
                <div class="card-sub">${cloudIcon} ${fc.cloud_cover_pct}% cloud · ${fc.sunshine_hours.toFixed(1)} hrs sun</div>
            </div>
            <div class="card">
                <div class="card-label">Predicted Load</div>
                <div class="card-value">${p.predicted_load_kwh}<span class="card-unit">kWh</span></div>
                <div class="card-sub">House + EV + spa</div>
            </div>
            <div class="card">
                <div class="card-label">Solar Gap</div>
                <div class="card-value">${p.solar_gap_kwh}<span class="card-unit">kWh</span></div>
                <div class="card-sub">Grid or battery must cover this</div>
            </div>
        </div>

        <!-- Weather -->
        <div class="weather-row">
            <span>${cloudIcon} <b>${fc.cloud_cover_pct}%</b> cloud cover</span>
            <span>☀️ <b>${fc.sunshine_hours.toFixed(1)} hrs</b> sunshine</span>
            <span>🌡️ <b>${fc.temp_min_f}° – ${fc.temp_max_f}°F</b></span>
            <span>📡 <b>${fc.shortwave_radiation} MJ/m²</b> radiation</span>
        </div>

        <!-- EV toggle -->
        <div class="ev-row">
            <span>🚗 Charging the EV tonight?</span>
            <label class="ev-toggle" id="ev-toggle">
                <div class="toggle-switch on" id="toggle-switch"></div>
                <span class="ev-label" id="ev-label">YES</span>
                <span class="ev-kwh" id="ev-kwh">— 30 kWh</span>
            </label>
        </div>

        <!-- Savings -->
        <div class="savings">
            <div class="savings-title">💰 Savings vs charging to 100% every night</div>
            <div class="savings-row">
                <span class="label">Old way (100% every night)</span>
                <span class="amount">${s.current_nightly_kwh} kWh · $${s.current_nightly_cost}/night</span>
            </div>
            <div class="savings-row">
                <span class="label">Optimized tonight</span>
                <span class="amount" id="opt-kwh">${s.optimal_nightly_kwh} kWh · $${s.optimal_nightly_cost}/night</span>
            </div>
            <div class="savings-row" style="border-top:1px solid rgba(255,255,255,0.06);padding-top:0.5rem;margin-top:0.3rem">
                <span class="label">Tonight's saving</span>
                <span class="amount green" id="saving-daily">$${s.daily_savings}</span>
            </div>
            <div class="savings-row">
                <span class="label">Monthly run rate</span>
                <span class="amount green" id="saving-monthly">$${s.monthly_savings}</span>
            </div>
            <div class="savings-row">
                <span class="label">Annual run rate</span>
                <span class="amount green" id="saving-annual">$${s.annual_savings}</span>
            </div>
        <!-- Apply button -->
        <div class="apply-section">
            <button class="apply-btn" id="apply-btn" onclick="applySettings()">
                ⚡ Apply Tonight's Settings to Sol-Ark
            </button>
            <div class="apply-status" id="apply-status">
                Settings will be written to both inverters
            </div>
        </div>

        </div>

        <!-- Accuracy Charts -->
        <div class="charts-section" id="charts-section"></div>
    `;

    footer.textContent = `Last updated: ${data.generated_at} · Model accuracy — Solar R²: ${data.solar_r2} · Load R²: ${data.load_r2}`;

    // ── Load accuracy charts ────────────────────────────────────
    loadAccuracyCharts();

    // ── EV toggle logic ──────────────────────────────────────────
    const BATTERY_KWH   = 80;
    const MIN_SOC       = 0.20;
    const MAX_SOC       = 0.90;
    const RATE          = 0.070;
    const OLD_CHARGE    = 64;    // what you charge now (80% of 80kWh)
    const EV_KWH        = 30;
    const SPA_KWH       = 4;

    let evOn = true;

    function recalc() {
        const overnightLoads = SPA_KWH + (evOn ? EV_KWH : 0);
        const currentKwh     = BATTERY_KWH * (p.current_soc_pct / 100);
        const minKwh         = BATTERY_KWH * MIN_SOC;
        const maxKwh         = BATTERY_KWH * MAX_SOC;
        const buffer         = p.predicted_load_kwh * 0.10;
        const targetKwh      = Math.min(maxKwh, minKwh + overnightLoads + p.solar_gap_kwh + buffer);
        const chargeNeeded   = Math.max(0, Math.round(targetKwh - currentKwh));
        const targetSoc      = Math.round(targetKwh / BATTERY_KWH * 100);
        const optCost        = (chargeNeeded * RATE).toFixed(2);
        const oldCost        = (OLD_CHARGE * RATE).toFixed(2);
        const dailySav       = (oldCost - optCost).toFixed(2);

        // Update hero
        document.getElementById('hero-soc').textContent  = targetSoc + '%';
        if (chargeNeeded === 0) {
            document.getElementById('hero-detail').innerHTML =
                `<div class="no-charge-badge">✅ No charging needed tonight</div>`;
        } else {
            document.getElementById('hero-detail').innerHTML =
                `<div class="hero-unit">Charge ${chargeNeeded} kWh between 11 PM – 7 AM</div>
                 <div class="hero-sub">@ $0.07/kWh all-in super off-peak rate</div>`;
        }

        // Update savings
        document.getElementById('opt-kwh').textContent    = `${chargeNeeded} kWh · $${optCost}/night`;
        document.getElementById('saving-daily').textContent   = `$${dailySav}`;
        document.getElementById('saving-monthly').textContent = `$${(dailySav * 30).toFixed(2)}`;
        document.getElementById('saving-annual').textContent  = `$${(dailySav * 365).toFixed(2)}`;
    }

    document.getElementById('ev-toggle').addEventListener('click', () => {
        evOn = !evOn;
        document.getElementById('toggle-switch').classList.toggle('on', evOn);
        document.getElementById('ev-label').textContent = evOn ? 'YES' : 'NO';
        document.getElementById('ev-kwh').textContent   = evOn ? '— 30 kWh' : '— saving 30 kWh';
        recalc();
    });
}

// ── Apply settings to inverter ───────────────────────────────────────────────
// Agent URL is injected at deploy time via data.json
async function applySettings() {
    const btn    = document.getElementById('apply-btn');
    const status = document.getElementById('apply-status');

    // Get current target SOC from the live recalc
    const heroText = document.getElementById('hero-soc')?.textContent || '';
    const targetSoc = parseInt(heroText);
    if (!targetSoc || isNaN(targetSoc)) {
        status.textContent = '❌ Could not read charge target — reload the page';
        status.className = 'apply-status error';
        return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ Applying…';
    status.textContent = `Writing ${targetSoc}% charge limit to both inverters...`;
    status.className = 'apply-status';

    try {
        const agentUrl = window._agentUrl;
        if (!agentUrl || agentUrl.includes('YOUR-TUNNEL')) {
            throw new Error('Agent not configured yet — Pi not set up');
        }

        const resp = await fetch(`${agentUrl}/apply`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Agent-Key': window._agentKey || '',
            },
            body: JSON.stringify({ target_soc_pct: targetSoc }),
        });

        const result = await resp.json();
        if (result.success) {
            btn.textContent = `✅ Applied — ${targetSoc}% set on both inverters`;
            status.textContent = result.results.map(r =>
                `${r.name}: ${r.confirmed}% confirmed`).join(' · ');
            status.className = 'apply-status success';
        } else {
            throw new Error(result.results?.map(r => r.error).join(', ') || 'Write failed');
        }
    } catch (e) {
        btn.disabled = false;
        btn.textContent = '⚡ Apply Tonight\'s Settings to Sol-Ark';
        status.textContent = `❌ ${e.message}`;
        status.className = 'apply-status error';
    }
}

        const latestResp = await fetch(

            { headers: { apikey: SUPABASE_KEY } }
        );
        const latest = (await latestResp.json())[0];
        if (!latest) return;

        // Show live bar
        const bar = document.getElementById('live-bar');
        const stats = document.getElementById('live-stats');
        const timeEl = document.getElementById('live-time');
        bar.style.display = '';

        const soc = latest.soc || 0;
        const pv = latest.pv_power || 0;
        const target = latest.charge_target || 0;

        const socClass = soc > 60 ? 'green' : soc > 30 ? 'yellow' : '';

        stats.innerHTML = `
            <div class="live-stat">
                <div class="live-val ${socClass}">${soc}%</div>
                <div class="live-lbl">Battery</div>
            </div>
            <div class="live-stat">
                <div class="live-val ${pv > 0 ? 'green' : ''}">${pv >= 1000 ? (pv/1000).toFixed(1) + ' kW' : pv + ' W'}</div>
                <div class="live-lbl">Solar Now</div>
            </div>
            <div class="live-stat">
                <div class="live-val">${target}%</div>
                <div class="live-lbl">Charge Target</div>
            </div>
        `;

        const ts = new Date(latest.timestamp);
        const ago = Math.round((Date.now() - ts.getTime()) / 60000);
        timeEl.textContent = ago < 2 ? 'Just now' : ago < 60 ? `${ago}m ago` : `${Math.round(ago/60)}h ago`;

        // Get today's readings for the chart
        const today = new Date().toISOString().slice(0, 10);
        const todayResp = await fetch(
            `${SUPABASE_URL}/rest/v1/solar_readings?timestamp=gte.${today}T00:00:00&order=timestamp.asc`,
            { headers: { apikey: SUPABASE_KEY } }
        );
        const todayData = await todayResp.json();

        if (todayData.length >= 2) {
            document.getElementById('today-chart-card').style.display = '';
            buildTodayChart(todayData);
        }
    } catch (e) {
        console.warn('Live data fetch failed:', e);
    }
}

function buildTodayChart(readings) {
    const labels = readings.map(r => {
        const d = new Date(r.timestamp);
        return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    });

    const socData = readings.map(r => r.soc);
    const pvData = readings.map(r => Math.max(0, r.pv_power || 0));

    if (todayChartInstance) todayChartInstance.destroy();

    todayChartInstance = new Chart(document.getElementById('today-chart'), {
        type: 'line',
        data: {
            labels,
            datasets: [
                {
                    label: 'Battery SOC %',
                    data: socData,
                    borderColor: '#34d399',
                    backgroundColor: 'rgba(52,211,153,0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 3,
                    pointBackgroundColor: '#34d399',
                    yAxisID: 'y',
                },
                {
                    label: 'Solar Power (W)',
                    data: pvData,
                    borderColor: '#fbbf24',
                    backgroundColor: 'rgba(251,191,36,0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 3,
                    pointBackgroundColor: '#fbbf24',
                    yAxisID: 'y1',
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { labels: { color: 'rgba(255,255,255,0.6)', font: { size: 11 } } }
            },
            scales: {
                x: {
                    ticks: { color: 'rgba(255,255,255,0.4)', font: { size: 10 } },
                    grid: { color: 'rgba(255,255,255,0.05)' }
                },
                y: {
                    position: 'left',
                    min: 0, max: 100,
                    ticks: { color: '#34d399', callback: v => v + '%' },
                    grid: { color: 'rgba(255,255,255,0.05)' },
                    title: { display: true, text: 'SOC %', color: '#34d399' }
                },
                y1: {
                    position: 'right',
                    min: 0,
                    ticks: { color: '#fbbf24', callback: v => v >= 1000 ? (v/1000).toFixed(1)+'kW' : v+'W' },
                    grid: { display: false },
                    title: { display: true, text: 'Solar', color: '#fbbf24' }
                }
            }
        }
    });
}

// Load live data and refresh every 5 minutes
loadLiveData();
setInterval(loadLiveData, 5 * 60 * 1000);

// ── Accuracy Charts ──────────────────────────────────────────────────────────
async function loadAccuracyCharts() {
    const section = document.getElementById('charts-section');
    if (!section) return;

    let acc;
    try {
        const resp = await fetch('accuracy.json?t=' + Date.now());
        acc = await resp.json();
    } catch (e) {
        section.innerHTML = `<div class="no-accuracy">Accuracy tracking starts after the first full day of predictions.</div>`;
        return;
    }

    if (!acc || acc.length === 0) {
        section.innerHTML = `<div class="no-accuracy">No accuracy data yet. Check back tomorrow.</div>`;
        return;
    }

    // Sort by date
    acc.sort((a, b) => a.date.localeCompare(b.date));

    const dates       = acc.map(r => r.date.slice(5)); // MM-DD
    const predSolar   = acc.map(r => r.pred_solar);
    const actSolar    = acc.map(r => r.actual_solar);
    const predLoad    = acc.map(r => r.pred_load);
    const actLoad     = acc.map(r => r.actual_load);
    const solarErrors = acc.map(r => Math.abs(r.solar_error_pct));
    const loadErrors  = acc.map(r => Math.abs(r.load_error_pct));

    // Compute summary stats
    const avgSolarErr = (solarErrors.reduce((a,b) => a+b, 0) / solarErrors.length).toFixed(1);
    const avgLoadErr  = (loadErrors.reduce((a,b) => a+b, 0) / loadErrors.length).toFixed(1);
    const daysScored  = acc.length;
    const overcharges = acc.filter(r => (r.pred_load - r.pred_solar) > (r.actual_load - r.actual_solar)).length;

    function errClass(v) { return v < 15 ? 'good' : v < 30 ? 'warn' : 'bad'; }

    section.innerHTML = `
        <div class="chart-card">
            <h3>Prediction Accuracy — ${daysScored} days tracked</h3>
            <div class="accuracy-stats">
                <div class="acc-stat">
                    <div class="val ${errClass(avgSolarErr)}">${avgSolarErr}%</div>
                    <div class="lbl">Avg Solar Error</div>
                </div>
                <div class="acc-stat">
                    <div class="val ${errClass(avgLoadErr)}">${avgLoadErr}%</div>
                    <div class="lbl">Avg Load Error</div>
                </div>
                <div class="acc-stat">
                    <div class="val" style="color:rgba(255,255,255,0.8)">${daysScored}</div>
                    <div class="lbl">Days Scored</div>
                </div>
                <div class="acc-stat">
                    <div class="val" style="color:rgba(255,255,255,0.8)">${overcharges}/${daysScored}</div>
                    <div class="lbl">Days Overcharged</div>
                </div>
            </div>
        </div>
        <div class="chart-card">
            <h3>Solar — Predicted vs Actual (kWh)</h3>
            <div class="chart-wrap"><canvas id="solar-chart"></canvas></div>
        </div>
        <div class="chart-card">
            <h3>Load — Predicted vs Actual (kWh)</h3>
            <div class="chart-wrap"><canvas id="load-chart"></canvas></div>
        </div>
        <div class="chart-card">
            <h3>Prediction Error Over Time (%)</h3>
            <div class="chart-wrap"><canvas id="error-chart"></canvas></div>
        </div>
    `;

    const chartDefaults = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: {
                labels: { color: 'rgba(255,255,255,0.6)', font: { size: 11 } }
            }
        },
        scales: {
            x: {
                ticks: { color: 'rgba(255,255,255,0.4)', font: { size: 10 } },
                grid:  { color: 'rgba(255,255,255,0.05)' }
            },
            y: {
                ticks: { color: 'rgba(255,255,255,0.4)', font: { size: 10 } },
                grid:  { color: 'rgba(255,255,255,0.05)' }
            }
        }
    };

    // Solar chart
    new Chart(document.getElementById('solar-chart'), {
        type: 'bar',
        data: {
            labels: dates,
            datasets: [
                {
                    label: 'Predicted',
                    data: predSolar,
                    backgroundColor: 'rgba(233, 69, 96, 0.6)',
                    borderColor: 'rgba(233, 69, 96, 1)',
                    borderWidth: 1,
                    borderRadius: 4,
                    barPercentage: 0.8,
                    categoryPercentage: 0.7,
                },
                {
                    label: 'Actual',
                    data: actSolar,
                    backgroundColor: 'rgba(251, 191, 36, 0.6)',
                    borderColor: 'rgba(251, 191, 36, 1)',
                    borderWidth: 1,
                    borderRadius: 4,
                    barPercentage: 0.8,
                    categoryPercentage: 0.7,
                }
            ]
        },
        options: { ...chartDefaults }
    });

    // Load chart
    new Chart(document.getElementById('load-chart'), {
        type: 'bar',
        data: {
            labels: dates,
            datasets: [
                {
                    label: 'Predicted',
                    data: predLoad,
                    backgroundColor: 'rgba(99, 102, 241, 0.6)',
                    borderColor: 'rgba(99, 102, 241, 1)',
                    borderWidth: 1,
                    borderRadius: 4,
                    barPercentage: 0.8,
                    categoryPercentage: 0.7,
                },
                {
                    label: 'Actual',
                    data: actLoad,
                    backgroundColor: 'rgba(52, 211, 153, 0.6)',
                    borderColor: 'rgba(52, 211, 153, 1)',
                    borderWidth: 1,
                    borderRadius: 4,
                    barPercentage: 0.8,
                    categoryPercentage: 0.7,
                }
            ]
        },
        options: { ...chartDefaults }
    });

    // Error % chart (line)
    new Chart(document.getElementById('error-chart'), {
        type: 'line',
        data: {
            labels: dates,
            datasets: [
                {
                    label: 'Solar Error %',
                    data: solarErrors,
                    borderColor: '#e94560',
                    backgroundColor: 'rgba(233, 69, 96, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                    pointBackgroundColor: '#e94560',
                },
                {
                    label: 'Load Error %',
                    data: loadErrors,
                    borderColor: '#6366f1',
                    backgroundColor: 'rgba(99, 102, 241, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                    pointBackgroundColor: '#6366f1',
                }
            ]
        },
        options: { ...chartDefaults }
    });
}

load();
setInterval(load, 10 * 60 * 1000);
</script>
